name: Python Release

# Publishes found-sdk to PyPI when you push a tag like `py-v0.1.0`.
# Uses PyPI Trusted Publishing (OIDC) — no API token secret required once the
# trusted publisher is configured on PyPI (see python/PUBLISHING.md).

on:
  push:
    tags:
      - "py-v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build distribution
        working-directory: python
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: found-sdk-dist
          path: python/dist/*

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # required for PyPI Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: found-sdk-dist
          path: dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # If you prefer an API token instead of Trusted Publishing, set the
        # PYPI_API_TOKEN secret and uncomment the two lines below:
        # with:
        #   password: ${{ secrets.PYPI_API_TOKEN }}
